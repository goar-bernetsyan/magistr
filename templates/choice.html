<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Выбор Действий</title>
    <link rel="stylesheet" href="/static/css/style.css" /> <!-- Общие стили -->
    <link rel="stylesheet" href="/static/css/choice.css" /> <!-- Стили для choice -->

    <!-- Подключаем Google Fonts для шрифта -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header btn-header">
            <a href="/" class="nav-link">&lt; На главную</a>
            <button class="nav-link dataset-btn">Датасет</button>
        </header>

        <main class="main-content choice-main">
            <div class="status-message">
                <h2>Данные загружены!</h2>
                <h3>Выберите действия:</h3>
            </div>

            <div class="actions-list" id="actionsList">
                <ul>

                    <li class="action-item has-submenu" data-action="data_preprocessing">
                        <span class="toggle-icon"></span> Разведочный анализ данных
                    </li>
                    <ul class="submenu">
                        <li><label><input type="checkbox" name="action" value="data_overview"> Просмотр общей информации о датасете </label></li>
                        <li><label><input type="checkbox" name="action" value="statistical_analysis"> Статистический анализ основных признаков </label></li>
                        <li><label><input type="checkbox" name="action" value="distribution_visualization"> Визуализация распределений признаков </label></li>
                        <li><label><input type="checkbox" name="action" value="scatter_visualization"> Визуализация взаимосвязей признаков </label></li>
                        <li><label><input type="checkbox" name="action" value="correlation_analysis"> Анализ корреляций между признаками </label></li>
                        <li><label><input type="checkbox" name="action" value="missing_values" title="Проверяйте данные на пропуски перед обучением модели, т. к. большинство моделей не работают с ними."> Проверка наличия пропущенных значений </label></li>
                        <li><label><input type="checkbox" name="action" value="unique_value_analysis"> Анализ уникальных значений и частот </label></li>
                        <li><label><input type="checkbox" name="action" value="pivot_tables"> Создание сводных таблиц и группировок </label></li>
                    </ul>

                    <li class="action-item has-submenu" data-action="data_preprocessing">
                        <span class="toggle-icon"></span> Предварительная обработка данных
                    </li>
                    <ul class="submenu">
<!--                        <li><label><input type="checkbox" name="action" value="feature_engineering" title=""> Выделение и создание новых признаков </label></li>-->
                        <li><label><input type="checkbox" name="action" value="deleting_columns" title="Рекомендуется удалять столбцы, которые содержат более 50% пропусков или не коррелируют с целевой переменной."> Удаление столбцов </label></li>
                        <li><label><input type="checkbox" name="action" value="data_cleaning" title="Требуется для работы всех предложенных ниже моделей, кроме градиентных бустингов."> Очистка данных от пропусков </label></li>
                        <li><label><input type="checkbox" name="action" value="оutlier_removal" title=""> Удаление выбросов </label></li>
                        <li><label><input type="checkbox" name="action" value="duplicate_removal" title="Полностью идентичные строки не несут новой информации и могут исказить результаты обучения.&#13;&#10НО их можно оставить, если они отражают важные закономерности или частотные характеристики (например, показывают частоту покупок)."> Удаление дубликатов </label></li>
                        <li><label><input type="checkbox" name="action" value="scaling_normalization" title=""> Нормализация признаков </label></li>
                        <li><label><input type="checkbox" name="action" value="categorical_encoding" title="Преобразование текстовых категорий в числа.&#13;&#10Требуется для работы всех предложенных ниже моделей."> Кодирование категориальных признаков </label></li>
<!--                        <li><label><input type="checkbox" name="action" value="time_series"> Работа с временными рядами </label></li>-->
                    </ul>

                    <li class="action-item has-submenu" data-action="ml_models">
                        <span class="toggle-icon"></span> Машинное обучение
                    </li>
                    <ul class="submenu">
                        <li class="action-item has-submenu" data-action="outlier_removal">
                            <span class="toggle-icon" title="Прогнозирование непрерывных числовых переменных&#13;&#10(например, цена, температура, объём продаж)."></span> Регрессия
                        </li>
                        <ul class="submenu">
                            <!-- Подподпункты -->
                            <li><label><input type="checkbox" name="action" value="R_linear_regression" title="Быстрая и простая, для линейных связей, чувствительна к выбросам."> Линейная регрессия </label></li>
                            <li><label><input type="checkbox" name="action" value="R_decision_tree" title="Обрабатывает нелинейные, сложные связи, склонно к переобучению (особенно на малых данных), чувствительно к шумам."> Деревья решений  </label></li>
                            <li><label><input type="checkbox" name="action" value="R_random_forest" title="Улучшенная версия дерева решений: устойчивее к переобучению и шуму, но медленнее."> Случайный лес </label></li>
                            <li><label><input type="checkbox" name="action" value="R_gradient_boosting_xg" title="Высокоточный, устойчив к выбросам, подходит для больших данных.&#13;&#10Требует тщательного подбора параметров.&#13;&#10Может работать с пропусками."> Градиентный бустинг XGBoost </label></li>
                            <li><label><input type="checkbox" name="action" value="R_gradient_boosting_cat" title="Высокоточный, очень устойчив к выбросам и к переобучению.&#13;&#10Подходит для больших данных (но медленнее XGBoost).&#13;&#10Может работать с пропусками."> Градиентный бустинг CatBoost </label></li>
                            <li><label><input type="checkbox" name="action" value="R_svm" title="Для сложных задач на небольших наборах данных, хорошо разделяет сложные границы."> Метод опорных векторов (SVM) </label></li>
                            <li><label><input type="checkbox" name="action" value="R_knn" title="Для небольших и простых наборов данных, чувствительна к шумам и выбросам."> Метод K-ближайших соседей (KNN) </label></li>
                        </ul>
                        <li class="action-item has-submenu" data-action="dl_models">
                            <span class="toggle-icon" title="Отнесение объектов к заранее определённым дискретным классам&#13;&#10(например, да/нет, оценка (1-5), диагноз)."></span> Классификация
                        </li>
                        <ul class="submenu">
                            <!-- Подподпункты -->
                            <li><label><input type="checkbox" name="action" value="C_logistic_regression" title="Быстрая и простая, но плохо справляется со сложными зависимостями."> Логистическая регрессия </label></li>
                            <li><label><input type="checkbox" name="action" value="C_decision_tree" title="Обрабатывает нелинейные, сложные связи, склонно к переобучению (особенно на малых данных), чувствительно к шумам."> Деревья решений  </label></li>
                            <li><label><input type="checkbox" name="action" value="C_random_forest" title="Улучшенная версия дерева решений: устойчивее к переобучению и шуму, но медленнее."> Случайный лес </label></li>
                            <li><label><input type="checkbox" name="action" value="C_gradient_boosting_xg" title="Высокоточный, устойчив к выбросам, подходит для больших данных, быстрый.&#13;&#10Требует тщательного подбора параметров."> Градиентный бустинг (XGBoost) </label></li>
                            <li><label><input type="checkbox" name="action" value="C_gradient_boosting_cat" title="Высокоточный, очень устойчив к выбросам и к переобучению.&#13;&#10Подходит для больших данных (но медленнее XGBoost).&#13;&#10Отличный выбор, если в данных много категориальных признаков (сам их обрабатывает)."> Градиентный бустинг (CatBoost) </label></li>
                            <li><label><input type="checkbox" name="action" value="C_svm" title="Для сложных задач на небольших наборах данных, хорошо разделяет сложные границы."> Метод опорных векторов (SVM) </label></li>
                            <li><label><input type="checkbox" name="action" value="C_knn" title="Для небольших и простых наборов данных, чувствительна к шумам и выбросам."> Метод K-ближайших соседей (KNN) </label></li>
                        </ul>
                    </ul>

                </ul>
            </div>
            <button class="ready-btn" onclick="submitActions()">Готово</button>
        </main>
    </div>

    <!-- Модальное окно для просмотра датасета -->
    <div id="datasetViewerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Просмотр датасета: {{ filename }}</h3>
                <span class="close-button" onclick="closeDatasetViewer()">&times;</span>
            </div>
            <div class="modal-body">
                <p>Загрузка данных...</p>
                <table id="datasetTable">
                    <!-- Таблица будет заполнена динамически -->
                </table>
            </div>
        </div>
    </div>

    <script src="/static/js/scripts.js"></script> <!-- Общие скрипты (если есть) -->
    <script src="/static/js/choice.js"></script>   <!-- Скрипты для choice -->
    <script>
        // Получаем имя файла из шаблона Flask
        const uploadedFilename = "{{ filename }}";
    </script>

</body>
</html>
